<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>TV DASHBOARD PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; -webkit-font-smoothing: antialiased; }
        #header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #30363d; padding-bottom: 15px; box-sizing: border-box; }
        h1 { font-size: 22px; font-weight: 700; color: #58a6ff; margin: 0; letter-spacing: -0.5px; }
        #chan-count { font-size: 13px; color: #8b949e; font-weight: 600; background: #21262d; padding: 4px 12px; border-radius: 20px; }
        .player-container { width: 100%; max-width: 820px; background: #000; margin-bottom: 40px; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .category-container { width: 100%; max-width: 1000px; margin-bottom: 45px; box-sizing: border-box; }
        .category-title { font-size: 16px; color: #f1e05a; margin-bottom: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; }
        .category-title::before { content: ""; display: inline-block; width: 4px; height: 18px; background: #58a6ff; margin-right: 12px; border-radius: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; width: 100%; }
        .channel-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; cursor: pointer; transition: all 0.25s ease; overflow: hidden; display: flex; flex-direction: column; }
        .channel-card:hover { transform: translateY(-5px); border-color: #58a6ff; background-color: #1c2128; }
        .logo-box { width: 100%; height: 100px; display: flex; justify-content: center; align-items: center; background: #0d1117; padding: 15px; box-sizing: border-box; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info-box { padding: 12px; text-align: center; border-top: 1px solid #30363d; background: #161b22; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .name { font-size: 13.5px; font-weight: 600; color: #f0f6fc; text-transform: uppercase; line-height: 1.3; }
        @media (max-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; } .logo-box { height: 80px; padding: 10px; } .name { font-size: 11.5px; } body { padding: 10px; } .player-container { margin-bottom: 25px; } h1 { font-size: 18px; } }
    </style>
</head>
<body style="display:none;" id="mainBody"> <div id="header">
        <h1>DASHBOARD TV</h1>
        <div id="chan-count">0 CANALI</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" style="width: 100%;"></div>

<script type="module">
// --- CONFIGURAZIONE FIREBASE ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, set, onDisconnect, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpJo38SND-G9NjKBt37JLTiRhtKbQKOb0",
  authDomain: "test-lista-c8059.firebaseapp.com",
  projectId: "test-lista-c8059",
  databaseURL: "https://test-lista-c8059-default-rtdb.europe-west1.firebasedatabase.app",
  storageBucket: "test-lista-c8059.firebasestorage.app",
  messagingSenderId: "557405974412",
  appId: "1:557405974412:web:162a1be3708640c110b0a9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const lockRef = ref(db, 'session/active');

async function checkAccess() {
    const password = prompt("Inserisci la Password di accesso:");
    if (password !== "1234") {
        alert("Password errata!");
        window.location.reload();
        return;
    }

    // Controlla se c'è già una sessione attiva
    const snapshot = await get(lockRef);
    const session = snapshot.val();
    const ora = Date.now();

    // Se occupato da meno di 45 secondi (tolleranza heartbeat)
    if (session && session.occupied && (ora - session.lastSeen < 45000)) {
        alert("Errore: Un altro dispositivo sta già usando questa Dashboard!");
        document.body.style.display = "block";
        document.body.innerHTML = "<h2 style='color:red; text-align:center; margin-top:50px;'>ACCESSO NEGATO: POSTO OCCUPATO</h2>";
        return;
    }

    // Se libero, occupa il posto
    await set(lockRef, { occupied: true, lastSeen: ora });
    
    // Heartbeat: aggiorna ogni 20 secondi che siamo ancora qui
    setInterval(() => {
        set(lockRef, { occupied: true, lastSeen: Date.now() });
    }, 20000);

    // RESET AUTOMATICO SE CHIUDI LA SCHEDA
    onDisconnect(lockRef).set({ occupied: false, lastSeen: Date.now() });

    // Mostra il sito e avvia i canali
    document.getElementById('mainBody').style.display = "flex";
    initDashboard();
}

// --- LOGICA CANALI (TUA ORIGINALE) ---
const SOURCE = "lista.m3u";

async function initDashboard() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');
    const chanCount = document.getElementById('chan-count');

    player.configure({ manifest: { dash: { ignoreDrmInfo: true } }, streaming: { jumpLargeGaps: true } });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (request.uris[0].includes('pluscdn.pl') || request.uris[0].includes('t-mobile.pl')) {
            request.allowCrossOrigin = true;
            delete request.headers['Origin'];
            delete request.headers['Referer'];
        }
    });

    try {
        const res = await fetch(SOURCE);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                if (line.includes('{')) {
                    try { ch.drm = JSON.parse(line.split('license_key=')[1]); } catch(e) {}
                } else {
                    const m = line.match(/[a-f0-9]{32}/gi);
                    if (m && m.length >= 2) {
                        for (let i = 0; i < m.length; i += 2) { if (m[i+1]) ch.drm[m[i]] = m[i+1]; }
                    }
                }
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};
                count++;

                let gridId = `grid-${currentCh.group.replace(/\s+/g, '-').toLowerCase()}`;
                let grid = document.getElementById(gridId);
                
                if (!grid) {
                    const container = document.createElement('div');
                    container.className = 'category-container';
                    container.innerHTML = `<div class="category-title">${currentCh.group.toUpperCase()}</div><div class="grid" id="${gridId}"></div>`;
                    mainList.appendChild(container);
                    grid = document.getElementById(gridId);
                }

                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="logo-box"><img src="${currentCh.logo}"></div>
                    <div class="info-box"><div class="name">${currentCh.name}</div></div>
                `;
                
                card.onclick = async () => {
                    await player.unload();
                    player.configure({ drm: { clearKeys: currentCh.drm } });
                    await player.load(url.replace('http://', 'https://'));
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                grid.appendChild(card);
                ch = { drm: {} };
            }
        }
        chanCount.innerText = count + " CANALI";
    } catch(e) {}
}

document.addEventListener('shaka-ui-loaded', checkAccess);
</script>
</body>
</html>
