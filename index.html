<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>DASHBOARD TV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; -webkit-font-smoothing: antialiased; }
        
        /* Header identico allo screenshot */
        #header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        h1 { font-size: 14px; font-weight: 700; color: #58a6ff; margin: 0; text-transform: uppercase; }
        #chan-count { font-size: 9px; color: #8b949e; background: #21262d; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; border: 1px solid #30363d; }
        
        .player-container { width: 100%; max-width: 820px; background: #000; margin-bottom: 30px; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }

        .category-container { width: 100%; max-width: 1000px; margin-bottom: 40px; }
        .category-title { font-size: 13px; color: #f1e05a; margin-bottom: 15px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; }
        .category-title::before { content: ""; display: inline-block; width: 3px; height: 15px; background: #58a6ff; margin-right: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; width: 100%; }
        
        /* Stile Card Sky */
        .channel-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; cursor: pointer; transition: 0.2s; overflow: hidden; display: flex; flex-direction: column; }
        .channel-card:hover { border-color: #58a6ff; transform: translateY(-3px); }
        
        .logo-box { width: 100%; height: 90px; display: flex; justify-content: center; align-items: center; background: #0d1117; padding: 12px; box-sizing: border-box; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .info-box { padding: 8px; text-align: center; border-top: 1px solid #30363d; background: #161b22; }
        .name { font-size: 10px; font-weight: 600; color: #8b949e; text-transform: uppercase; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
            .logo-box { height: 70px; }
            .name { font-size: 9px; }
        }
    </style>
</head>
<body id="mainBody" style="display:none;">

    <div id="header">
        <h1>DASHBOARD TV</h1>
        <div id="chan-count">0 CANALI</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" style="width: 100%;"></div>

<script type="module">
// --- CONFIGURAZIONE FIREBASE ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, set, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpJo38SND-G9NjKBt37JLTiRhtKbQKOb0",
  authDomain: "test-lista-c8059.firebaseapp.com",
  projectId: "test-lista-c8059",
  databaseURL: "https://test-lista-c8059-default-rtdb.europe-west1.firebasedatabase.app",
  storageBucket: "test-lista-c8059.firebasestorage.app",
  messagingSenderId: "557405974412",
  appId: "1:557405974412:web:162a1be3708640c110b0a9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const lockRef = ref(db, 'session/active');

async function checkAccess() {
    const password = prompt("Password:");
    if (password !== "1234") {
        alert("Errata!");
        window.location.reload();
        return;
    }

    const snapshot = await get(lockRef);
    const session = snapshot.val();
    const ora = Date.now();

    // Se qualcuno è entrato meno di 40 secondi fa, blocca
    if (session && session.occupied && (ora - session.lastSeen < 40000)) {
        alert("Posto già occupato da un altro dispositivo!");
        document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:100px;'>SESSIONE ATTIVA SU ALTRO DISPOSITIVO</h2>";
        document.body.style.display = "block";
        return;
    }

    // Occupa e attiva heartbeat
    await set(lockRef, { occupied: true, lastSeen: ora });
    setInterval(() => { set(lockRef, { occupied: true, lastSeen: Date.now() }); }, 20000);
    onDisconnect(lockRef).set({ occupied: false, lastSeen: Date.now() });

    document.getElementById('mainBody').style.display = "flex";
    initDashboard();
}

// --- TUA LOGICA CANALI ---
const SOURCE = "lista.m3u";

async function initDashboard() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');
    const chanCount = document.getElementById('chan-count');

    player.configure({ manifest: { dash: { ignoreDrmInfo: true } }, streaming: { jumpLargeGaps: true } });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (request.uris[0].includes('pluscdn.pl') || request.uris[0].includes('t-mobile.pl')) {
            request.allowCrossOrigin = true;
            delete request.headers['Origin'];
            delete request.headers['Referer'];
        }
    });

    try {
        const res = await fetch(SOURCE);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                if (line.includes('{')) {
                    try { ch.drm = JSON.parse(line.split('license_key=')[1]); } catch(e) {}
                } else {
                    const m = line.match(/[a-f0-9]{32}/gi);
                    if (m && m.length >= 2) {
                        for (let i = 0; i < m.length; i += 2) { if (m[i+1]) ch.drm[m[i]] = m[i+1]; }
                    }
                }
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};
                count++;

                let gridId = `grid-${currentCh.group.replace(/\s+/g, '-').toLowerCase()}`;
                let grid = document.getElementById(gridId);
                
                if (!grid) {
                    const container = document.createElement('div');
                    container.className = 'category-container';
                    container.innerHTML = `<div class="category-title">${currentCh.group}</div><div class="grid" id="${gridId}"></div>`;
                    mainList.appendChild(container);
                    grid = document.getElementById(gridId);
                }

                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="logo-box"><img src="${currentCh.logo}"></div>
                    <div class="info-box"><div class="name">${currentCh.name}</div></div>
                `;
                
                card.onclick = async () => {
                    await player.unload();
                    player.configure({ drm: { clearKeys: currentCh.drm } });
                    await player.load(url.replace('http://', 'https://'));
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                grid.appendChild(card);
                ch = { drm: {} };
            }
        }
        chanCount.innerText = count + " CANALI";
    } catch(e) {}
}

document.addEventListener('shaka-ui-loaded', checkAccess);
</script>
</body>
</html>
