<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tony16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <style>
        body { background: #0d1117; color: #white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .player-box { width: 100%; max-width: 800px; margin-bottom: 30px; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; }
        .container { width: 100%; max-width: 1100px; }
        .group-title { color: #f1e05a; font-size: 18px; margin: 20px 0 10px; border-left: 4px solid #58a6ff; padding-left: 10px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; cursor: pointer; text-align: center; }
        .card:hover { border-color: #58a6ff; }
        .card img { max-width: 100%; height: 50px; object-fit: contain; }
        .card p { font-size: 11px; color: #c9d1d9; margin: 5px 0 0; font-weight: bold; }
        #info { color: #8b949e; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h2 style="color:#58a6ff">TONY16 DASHBOARD</h2>
    <div id="info">Inizializzazione...</div>

    <div class="player-box" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" class="container"></div>

<script>
const FILE_NAME = "lista Tony.m3u"; 

async function initApp() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const listContainer = document.getElementById('main-list');

    player.configure({ 
        streaming: { jumpLargeGaps: true },
        manifest: { dash: { ignoreDrmInfo: true } }
    });

    try {
        const r = await fetch(FILE_NAME);
        if (!r.ok) throw new Error("File non trovato");
        const t = await r.text();
        const lines = t.split('\n');

        let current = { name: "", logo: "", group: "ALTRI", drm: {} };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (!line) continue;

            if (line.includes('#KODIPROP:inputstream.adaptive.license_key=')) {
                let val = line.split('=')[1];
                try {
                    if (val.includes('{')) {
                        current.drm = JSON.parse(val);
                    } else if (val.includes(':')) {
                        let p = val.split(':');
                        current.drm[p[0].trim()] = p[1].trim();
                    }
                } catch(e) { console.log("Errore DRM riga"); }
            } 
            else if (line.startsWith('#EXTINF:')) {
                current.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                current.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                current.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } 
            else if (line.startsWith('http')) {
                const ch = {...current};
                const url = line;

                let grid = document.getElementById('g-' + ch.group);
                if (!grid) {
                    const title = document.createElement('div');
                    title.className = 'group-title';
                    title.innerText = ch.group;
                    listContainer.appendChild(title);
                    
                    grid = document.createElement('div');
                    grid.className = 'grid';
                    grid.id = 'g-' + ch.group;
                    listContainer.appendChild(grid);
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${ch.logo}"><p>${ch.name}</p>`;
                card.onclick = () => {
                    player.configure({ drm: { clearKeys: ch.drm } });
                    player.load(url);
                    window.scrollTo(0,0);
                };

                grid.appendChild(card);
                count++;
                current = { name: "", logo: "", group: "ALTRI", drm: {} };
            }
        }
        document.getElementById('info').innerText = count + " canali caricati";
    } catch(e) {
        document.getElementById('info').innerText = "Errore: controlla che il file si chiami 'lista Tony.m3u'";
    }
}

document.addEventListener('shaka-ui-loaded', initApp);
</script>
</body>
</html>
