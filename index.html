<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Dashboard PRO - Tony16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #30363d; padding-bottom: 15px; }
        h1 { font-size: 22px; font-weight: 700; color: #58a6ff; margin: 0; }
        #chan-count { font-size: 13px; color: #8b949e; background: #21262d; padding: 4px 12px; border-radius: 20px; }
        .player-container { width: 100%; max-width: 820px; background: #000; margin-bottom: 40px; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .category-container { width: 100%; max-width: 1200px; margin-bottom: 45px; }
        .category-title { font-size: 16px; color: #f1e05a; margin-bottom: 20px; font-weight: 700; text-transform: uppercase; border-left: 4px solid #58a6ff; padding-left: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .channel-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; cursor: pointer; overflow: hidden; transition: 0.2s; }
        .channel-card:hover { border-color: #58a6ff; transform: translateY(-3px); }
        .channel-card.active { border: 2px solid #58a6ff; }
        .logo-box { width: 100%; height: 100px; display: flex; justify-content: center; align-items: center; background: #0d1117; padding: 10px; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info-box { padding: 10px; text-align: center; border-top: 1px solid #30363d; }
        .name { font-size: 12px; font-weight: 600; color: #f0f6fc; }
    </style>
</head>
<body>

    <div id="header">
        <h1>DASHBOARD TONY16</h1>
        <div id="chan-count">Caricamento canali...</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" style="width: 100%;"></div>

<script>
const SOURCE_URL = "lista.m3u";

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');
    const countHeader = document.getElementById('chan-count');

    // Configurazione critica per canali Portogallo/Polonia
    player.configure({ 
        streaming: { jumpLargeGaps: true },
        manifest: { dash: { ignoreDrmInfo: true } } 
    });

    function getCategoryGrid(groupName) {
        const name = (groupName || "ALTRI").toUpperCase().trim();
        let gridId = `grid-${name.replace(/\s+/g, '-')}`;
        let grid = document.getElementById(gridId);
        if (!grid) {
            const container = document.createElement('div');
            container.className = 'category-container';
            container.innerHTML = `<div class="category-title">${name}</div><div class="grid" id="${gridId}"></div>`;
            mainList.appendChild(container);
            grid = document.getElementById(gridId);
        }
        return grid;
    }

    function createCard(ch) {
        const grid = getCategoryGrid(ch.group);
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `
            <div class="logo-box"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150x80/21262d/8b949e?text=TV'"></div>
            <div class="info-box"><div class="name">${ch.name}</div></div>
        `;
        
        card.onclick = async () => {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            try {
                await player.unload();
                // Applichiamo la ClearKey convertita
                player.configure({ drm: { clearKeys: ch.drm } });
                await player.load(ch.url);
                window.scrollTo({top: 0, behavior: 'smooth'});
            } catch(e) { console.error("Errore Shaka:", e.code); }
        };
        grid.appendChild(card);
    }

    try {
        const response = await fetch(SOURCE_URL);
        const text = await response.text();
        const lines = text.split('\n');

        let currentChannel = { name: "", logo: "", group: "ALTRI", drm: {}, url: "" };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (!line) continue;

            if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key=')) {
                let keyVal = line.split('=')[1];
                if (keyVal.includes('{')) {
                    // Gestione Olanda/Messico (JSON)
                    try { currentChannel.drm = JSON.parse(keyVal); } catch(e) {}
                } else if (keyVal.includes(':')) {
                    // Gestione Portogallo/Polonia (KID:KEY)
                    const parts = keyVal.split(':');
                    if (parts.length === 2) {
                        currentChannel.drm[parts[0].trim()] = parts[1].trim();
                    }
                }
            } else if (line.startsWith('#EXTINF:')) {
                const logo = line.match(/tvg-logo="([^"]+)"/i);
                const group = line.match(/group-title="([^"]+)"/i);
                const name = line.match(/,(.*)/);
                currentChannel.logo = logo ? logo[1] : "";
                currentChannel.group = group ? group[1] : "ALTRI";
                currentChannel.name = name ? name[1].trim() : "Canale";
            } else if (line.startsWith('http')) {
                currentChannel.url = line;
                createCard(currentChannel);
                count++;
                currentChannel = { name: "", logo: "", group: "ALTRI", drm: {}, url: "" };
            }
        }
        countHeader.innerText = `${count} CANALI DISPONIBILI`;
    } catch(e) { console.error("Errore caricamento m3u:", e); }
}

document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
