<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Dashboard PRO - Tony16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #30363d; padding-bottom: 15px; }
        h1 { font-size: 22px; font-weight: 700; color: #58a6ff; margin: 0; }
        #chan-count { font-size: 13px; color: #8b949e; background: #21262d; padding: 4px 12px; border-radius: 20px; }
        .player-container { width: 100%; max-width: 820px; background: #000; margin-bottom: 40px; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .category-container { width: 100%; max-width: 1200px; margin-bottom: 45px; }
        .category-title { font-size: 16px; color: #f1e05a; margin-bottom: 20px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; }
        .category-title::before { content: ""; display: inline-block; width: 4px; height: 18px; background: #58a6ff; margin-right: 12px; border-radius: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; width: 100%; }
        .channel-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; cursor: pointer; transition: 0.25s; overflow: hidden; display: flex; flex-direction: column; }
        .channel-card:hover { transform: translateY(-5px); border-color: #58a6ff; }
        .channel-card.active { border: 2px solid #58a6ff; }
        .logo-box { width: 100%; height: 100px; display: flex; justify-content: center; align-items: center; background: #0d1117; padding: 15px; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info-box { padding: 12px; text-align: center; border-top: 1px solid #30363d; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .name { font-size: 13px; font-weight: 600; color: #f0f6fc; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="header">
        <h1>DASHBOARD TONY16</h1>
        <div id="chan-count">Caricamento...</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>

<script>
const SOURCE_URL = "lista.m3u";

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');
    const countHeader = document.getElementById('chan-count');

    // Configurazione ultra-compatibile
    player.configure({ 
        streaming: { 
            jumpLargeGaps: true,
            lowLatencyMode: true,
            retryParameters: { maxAttempts: 4 }
        },
        manifest: { dash: { ignoreDrmInfo: true } }
    });

    // LA MAGIA PER POLONIA E PORTOGALLO
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        // 1. Forza HTTPS (quello che ha sbloccato i portoghesi)
        if (request.uris[0].startsWith('http://')) {
            request.uris[0] = request.uris[0].replace('http://', 'https://');
        }
        
        // 2. Rimuove le "impronte" di GitHub per i canali Polacchi e Portoghesi
        if (request.uris[0].includes('pluscdn.pl') || request.uris[0].includes('vodafone.pt')) {
            request.allowCrossOrigin = true;
            delete request.headers['Origin'];
            delete request.headers['Referer'];
            request.headers['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36';
        }
    });

    function getGrid(group) {
        const name = (group || "ALTRI").toUpperCase().trim();
        let gridId = `grid-${name.replace(/[^a-z0-9]/gi, '-')}`;
        let grid = document.getElementById(gridId);
        if (!grid) {
            const container = document.createElement('div');
            container.className = 'category-container';
            container.innerHTML = `<div class="category-title">${name}</div><div class="grid" id="${gridId}"></div>`;
            mainList.appendChild(container);
            grid = document.getElementById(gridId);
        }
        return grid;
    }

    try {
        const response = await fetch(SOURCE_URL);
        const text = await response.text();
        const lines = text.split('\n');
        let current = { name: "", logo: "", group: "ALTRI", drm: {}, url: "" };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                const val = line.split('=')[1];
                const m = val.match(/[a-f0-9]{32}/gi);
                if (m && m.length >= 2) current.drm[m[0]] = m[1];
            } else if (line.startsWith('#EXTINF:')) {
                current.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                current.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                current.name = (line.match(/,(.*)/) || [])[1] || "Unknown";
            } else if (line.startsWith('http')) {
                current.url = line;
                const ch = {...current};
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `<div class="logo-box"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150x80?text=TV'"></div><div class="info-box"><div class="name">${ch.name}</div></div>`;
                
                card.onclick = async () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    try {
                        await player.unload();
                        player.configure({ drm: { clearKeys: ch.drm } });
                        // Applichiamo la trasformazione HTTPS anche al manifest principale
                        await player.load(ch.url.replace('http://', 'https://'));
                        window.scrollTo({top: 0, behavior: 'smooth'});
                    } catch(e) { console.error("Errore Shaka:", e.code); }
                };
                
                getGrid(ch.group).appendChild(card);
                count++;
                current = { name: "", logo: "", group: "ALTRI", drm: {}, url: "" };
            }
        }
        countHeader.innerText = count + " CANALI CARICATI";
    } catch(e) { countHeader.innerText = "ERRORE CARICAMENTO"; }
}

document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
