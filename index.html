<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>DASHBOARD TONY16</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .player-container { width: 100%; max-width: 800px; background: #000; border-radius: 8px; border: 1px solid #30363d; }
        video { width: 100%; aspect-ratio: 16/9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; width: 100%; max-width: 1000px; margin-top: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px; cursor: pointer; text-align: center; font-size: 11px; }
        .card img { max-height: 40px; display: block; margin: 0 auto 5px; }
    </style>
</head>
<body>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="list" class="grid"></div>

<script>
const SOURCE = "lista.m3u";

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();

    // CONFIGURAZIONE AGGRESSIVA
    player.configure({
        manifest: { dash: { ignoreDrmInfo: true } },
        streaming: { 
            jumpLargeGaps: true,
            crossOrigin: 'anonymous' 
        }
    });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (request.uris[0].includes('pluscdn.pl')) {
            // Svuotiamo tutto quello che possiamo
            delete request.headers['Origin'];
            delete request.headers['Referer'];
            request.headers['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36';
        }
    });

    try {
        const res = await fetch(SOURCE);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                const m = line.match(/[a-f0-9]{32}/gi);
                if (m) ch.drm[m[0]] = m[1];
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${currentCh.logo}"><div>${currentCh.name}</div>`;
                card.onclick = async () => {
                    await player.unload();
                    player.configure({ drm: { clearKeys: currentCh.drm } });
                    // Forza HTTPS perché GitHub blocca HTTP a prescindere
                    await player.load(url.replace('http://', 'https://'));
                };
                document.getElementById('list').appendChild(card);
                ch = { drm: {} };
            }
        }
    } catch(e) {}
}
document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
