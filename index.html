<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>DASHBOARD TONY16 PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .player-container { width: 100%; max-width: 820px; background: #000; margin-bottom: 30px; border-radius: 8px; overflow: hidden; border: 1px solid #30363d; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; width: 100%; max-width: 1100px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 10px; cursor: pointer; text-align: center; transition: 0.2s; }
        .card:hover { border-color: #58a6ff; transform: translateY(-3px); }
        .card img { max-width: 100%; height: 60px; object-fit: contain; margin-bottom: 8px; }
        .group-title { color: #f1e05a; font-size: 16px; font-weight: bold; margin: 25px 0 10px; width: 100%; max-width: 1100px; border-left: 4px solid #58a6ff; padding-left: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h2 style="color:#58a6ff; margin-bottom:20px;">TONY16 TV DASHBOARD</h2>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="list" style="width:100%; display: flex; flex-direction: column; align-items: center;"></div>

<script>
const M3U_URL = "lista.m3u"; 

async function start() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const listDiv = document.getElementById('list');

    player.configure({ 
        streaming: { jumpLargeGaps: true },
        manifest: { dash: { ignoreDrmInfo: true } }
    });

    // QUESTA PARTE IMITA IL COMPORTAMENTO DEL LETTORE MPD
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.allowCrossOrigin = true;
        // Elimina le tracce di GitHub che causano il blocco CORS
        delete request.headers['Origin'];
        delete request.headers['Referer'];
        
        if (request.uris[0].includes('vodafone.pt') || request.uris[0].includes('pluscdn.pl')) {
            request.headers['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36';
        }
    });

    try {
        const response = await fetch(M3U_URL);
        const data = await response.text();
        const lines = data.split('\n');

        let ch = { name: "", logo: "", group: "ALTRI", drm: {} };

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                const val = line.split('=')[1];
                const m = val.match(/[a-f0-9]{32}/gi);
                if (m && m.length >= 2) ch.drm[m[0]] = m[1];
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const finalCh = {...ch};
                const url = line.replace('http://', 'https://'); // Forza HTTPS come hai fatto tu

                let grid = document.getElementById('g-' + finalCh.group);
                if (!grid) {
                    const t = document.createElement('div');
                    t.className = 'group-title';
                    t.innerText = finalCh.group;
                    listDiv.appendChild(t);
                    grid = document.createElement('div');
                    grid.className = 'grid';
                    grid.id = 'g-' + finalCh.group;
                    listDiv.appendChild(grid);
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${finalCh.logo}"><div style="font-size:12px;">${finalCh.name}</div>`;
                card.onclick = async () => {
                    try {
                        await player.unload();
                        player.configure({ drm: { clearKeys: finalCh.drm } });
                        await player.load(url);
                        window.scrollTo(0,0);
                    } catch(e) { console.error("Errore:", e.code); }
                };
                grid.appendChild(card);
                ch = { name: "", logo: "", group: "ALTRI", drm: {} };
            }
        }
    } catch (err) { console.error("Errore lista"); }
}

document.addEventListener('shaka-ui-loaded', start);
</script>
</body>
</html>
