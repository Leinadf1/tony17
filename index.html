<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <title>DASHBOARD TV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <style>
        body { background: #0f111a; color: white; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* Header superiore stile Screenshot */
        .top-bar { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; box-sizing: border-box; border-bottom: 1px solid #1a1d2b; }
        .top-bar .title { color: #58a6ff; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .top-bar .count { background: #1a1d2b; padding: 2px 8px; border-radius: 4px; font-size: 10px; color: #8b949e; border: 1px solid #30363d; }

        /* Player */
        .player-container { width: 100%; max-width: 1000px; background: #000; margin-top: 10px; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }

        /* Lista e Griglia */
        #list { width: 100%; max-width: 1000px; padding: 20px; box-sizing: border-box; }
        .group-title { color: #f1e05a; font-size: 13px; font-weight: bold; margin: 30px 0 15px; text-transform: uppercase; border-left: 3px solid #58a6ff; padding-left: 10px; display: flex; align-items: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }

        /* Stile Card come da immagine */
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; transition: 0.2s; overflow: hidden; display: flex; flex-direction: column; }
        .card:hover { border-color: #58a6ff; background: #1c2128; }
        
        .card-logo { height: 70px; display: flex; align-items: center; justify-content: center; padding: 10px; background: #161b22; }
        .card-logo img { max-height: 100%; max-width: 100%; object-fit: contain; }
        
        .card-name { background: #0d1117; padding: 8px 4px; font-size: 10px; text-align: center; color: #c9d1d9; border-top: 1px solid #30363d; text-transform: uppercase; font-weight: 500; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="title">DASHBOARD TV</div>
        <div class="count" id="channel-count">0 CANALI</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="list"></div>

<script>
const SOURCE = "lista.m3u";

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const listDiv = document.getElementById('list');
    let channelTotal = 0;

    player.configure({ manifest: { dash: { ignoreDrmInfo: true } } });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (request.uris[0].includes('pluscdn.pl') || request.uris[0].includes('t-mobile.pl')) {
            request.allowCrossOrigin = true;
            delete request.headers['Origin'];
            delete request.headers['Referer'];
        }
    });

    try {
        const res = await fetch(SOURCE);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                if (line.includes('{')) {
                    try { ch.drm = JSON.parse(line.split('license_key=')[1]); } catch(e) {}
                } else {
                    const m = line.match(/[a-f0-9]{32}/gi);
                    if (m && m.length >= 2) { for (let i = 0; i < m.length; i += 2) { if (m[i+1]) ch.drm[m[i]] = m[i+1]; } }
                }
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};
                channelTotal++;

                let grid = document.getElementById(currentCh.group);
                if (!grid) {
                    const title = document.createElement('div'); title.className = 'group-title'; title.innerText = currentCh.group;
                    listDiv.appendChild(title);
                    grid = document.createElement('div'); grid.className = 'grid'; grid.id = currentCh.group;
                    listDiv.appendChild(grid);
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-logo"><img src="${currentCh.logo}"></div>
                    <div class="card-name">${currentCh.name}</div>
                `;
                
                card.onclick = async () => {
                    await player.unload();
                    player.configure({ drm: { clearKeys: currentCh.drm } });
                    await player.load(url.replace('http://', 'https://'));
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                grid.appendChild(card);
                ch = { drm: {} };
            }
        }
        document.getElementById('channel-count').innerText = channelTotal + " CANALI";
    } catch(e) {}
}
document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
