<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>DASHBOARD TV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; -webkit-font-smoothing: antialiased; }
        
        #header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #30363d; padding-bottom: 15px; box-sizing: border-box; }
        h1 { font-size: 22px; font-weight: 700; color: #58a6ff; margin: 0; letter-spacing: -0.5px; }
        #chan-count { font-size: 13px; color: #8b949e; font-weight: 600; background: #21262d; padding: 4px 12px; border-radius: 20px; border: 1px solid #30363d; }
        
        .player-container { width: 100%; max-width: 820px; background: #000; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        
        .category-container { width: 100%; max-width: 1200px; margin-bottom: 45px; box-sizing: border-box; }
        .category-title { font-size: 16px; color: #f1e05a; margin-bottom: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; }
        .category-title::before { content: ""; display: inline-block; width: 4px; height: 18px; background: #58a6ff; margin-right: 12px; border-radius: 2px; }
        
        /* GRIGLIA STILE SCREENSHOT */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; width: 100%; }
        
        /* BOX CANALE STILE SCREENSHOT (Solo Logo) */
        .channel-card { 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            overflow: hidden; 
            aspect-ratio: 16/9; /* Box rettangolare come in foto */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 10px;
        }
        
        .channel-card:hover { 
            transform: scale(1.05); 
            border-color: #58a6ff; 
            background-color: #1c2128; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); 
        }
        
        .channel-card img { 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
        }

        @media (max-width: 600px) { 
            .grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; } 
            body { padding: 10px; } 
            h1 { font-size: 18px; } 
        }
    </style>
</head>
<body id="mainBody" style="display:none;">

    <div id="header">
        <h1>DASHBOARD TV</h1>
        <div id="chan-count">0 CANALI</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" style="width: 100%;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpJo38SND-G9NjKBt37JLTiRhtKbQKOb0",
  authDomain: "test-lista-c8059.firebaseapp.com",
  projectId: "test-lista-c8059",
  databaseURL: "https://test-lista-c8059-default-rtdb.europe-west1.firebasedatabase.app",
  storageBucket: "test-lista-c8059.firebasestorage.app",
  messagingSenderId: "557405974412",
  appId: "1:557405974412:web:162a1be3708640c110b0a9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function checkAccess() {
    const passwordInserita = prompt("Inserisci la Password:");
    if (!passwordInserita) return window.location.reload();

    try {
        const pwdSnapshot = await get(ref(db, 'passwords'));
        const pwdData = pwdSnapshot.val();
        let pwdKey = null;

        if (pwdData) {
            for (let key in pwdData) {
                if (pwdData[key] === passwordInserita) {
                    pwdKey = key;
                    break;
                }
            }
        }

        if (!pwdKey) {
            alert("Password errata!");
            window.location.reload();
            return;
        }

        const userLockRef = ref(db, `session/${pwdKey}`);
        const snapshot = await get(userLockRef);
        const session = snapshot.val();
        const ora = Date.now();

        if (session && session.occupied && (ora - session.lastSeen < 40000)) {
            alert("Questa password è già in uso!");
            document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:100px;'>PASSWORD GIÀ IN USO</h2>";
            document.body.style.display = "block";
            return;
        }

        await set(userLockRef, { occupied: true, lastSeen: ora });
        setInterval(() => { set(userLockRef, { occupied: true, lastSeen: Date.now() }); }, 20000);
        onDisconnect(userLockRef).set({ occupied: false, lastSeen: Date.now() });

        document.getElementById('mainBody').style.display = "flex";
        initDashboard();

    } catch (error) {
        console.error(error);
        alert("Errore tecnico.");
    }
}

const SOURCE = "lista.m3u";

async function initDashboard() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');
    const chanCount = document.getElementById('chan-count');

    player.configure({ manifest: { dash: { ignoreDrmInfo: true } }, streaming: { jumpLargeGaps: true } });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (request.uris[0].includes('pluscdn.pl') || request.uris[0].includes('t-mobile.pl')) {
            request.allowCrossOrigin = true;
            delete request.headers['Origin'];
            delete request.headers['Referer'];
        }
    });

    try {
        const res = await fetch(SOURCE);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                if (line.includes('{')) {
                    try { ch.drm = JSON.parse(line.split('license_key=')[1]); } catch(e) {}
                } else {
                    const m = line.match(/[a-f0-9]{32}/gi);
                    if (m && m.length >= 2) {
                        for (let i = 0; i < m.length; i += 2) { if (m[i+1]) ch.drm[m[i]] = m[i+1]; }
                    }
                }
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};
                count++;
                let gridId = `grid-${currentCh.group.replace(/\s+/g, '-').toLowerCase()}`;
                let grid = document.getElementById(gridId);
                if (!grid) {
                    const container = document.createElement('div');
                    container.className = 'category-container';
                    container.innerHTML = `<div class="category-title">${currentCh.group}</div><div class="grid" id="${gridId}"></div>`;
                    mainList.appendChild(container);
                    grid = document.getElementById(gridId);
                }
                
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.title = currentCh.name; // Mostra il nome al passaggio del mouse
                card.innerHTML = `<img src="${currentCh.logo}" alt="${currentCh.name}">`;
                
                card.onclick = async () => {
                    await player.unload();
                    player.configure({ drm: { clearKeys: currentCh.drm } });
                    await player.load(url);
                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                grid.appendChild(card);
                ch = { drm: {} };
            }
        }
        chanCount.innerText = count + " CANALI";
    } catch(e) {}
}

document.addEventListener('shaka-ui-loaded', checkAccess);
</script>
</body>
</html>
