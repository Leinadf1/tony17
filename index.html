<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>TV DASHBOARD PRO - VideoJS Version</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-eme@5.2.0/dist/videojs-contrib-eme.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #30363d; padding-bottom: 15px; box-sizing: border-box; }
        h1 { font-size: 22px; font-weight: 700; color: #58a6ff; margin: 0; }
        #chan-count { font-size: 13px; color: #8b949e; background: #21262d; padding: 4px 12px; border-radius: 20px; }
        .player-container { width: 100%; max-width: 820px; background: #000; margin-bottom: 40px; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-js { width: 100%; aspect-ratio: 16/9; }
        .category-container { width: 100%; margin-bottom: 45px; }
        .category-title { font-size: 16px; color: #f1e05a; margin-bottom: 20px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; }
        .category-title::before { content: ""; width: 4px; height: 18px; background: #58a6ff; margin-right: 12px; border-radius: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; width: 100%; }
        .channel-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; cursor: pointer; transition: all 0.25s ease; overflow: hidden; display: flex; flex-direction: column; }
        .channel-card:hover { transform: translateY(-5px); border-color: #58a6ff; }
        .channel-card.active { border: 2px solid #58a6ff; background-color: #21262d; }
        .logo-box { width: 100%; height: 100px; display: flex; justify-content: center; align-items: center; background: #0d1117; padding: 15px; box-sizing: border-box; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info-box { padding: 12px; text-align: center; border-top: 1px solid #30363d; background: #161b22; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .name { font-size: 13.5px; font-weight: 600; color: #f0f6fc; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="header">
        <h1>DASHBOARD TV</h1>
        <div id="chan-count">0 CANALI</div>
    </div>

    <div class="player-container">
        <video id="video-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div id="main-list" style="width: 100%;"></div>

<script>
const SOURCE_API = "lista.m3u";
// Inizializzazione Video.js
const player = videojs('video-player', {
    autoplay: true,
    fluid: true,
    html5: {
        vhs: { overrideNative: true },
        nativeVideoTracks: false,
        nativeAudioTracks: false,
        nativeTextTracks: false
    }
});
player.eme(); // Attiva estensioni DRM

async function init() {
    const mainList = document.getElementById('main-list');
    const chanCount = document.getElementById('chan-count');

    try {
        const res = await fetch(SOURCE_API);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            
            if (line.includes('license_key=') || line.includes('inputstream.adaptive.license_key=')) {
                let keyStr = line.split('=')[1];
                if (keyStr.includes('{')) {
                    try { ch.drm = JSON.parse(keyStr); } catch(e) {}
                } else {
                    const m = keyStr.match(/[a-f0-9]{32}/gi);
                    if (m && m.length >= 2) {
                        for (let i = 0; i < m.length; i += 2) { if (m[i+1]) ch.drm[m[i]] = m[i+1]; }
                    }
                }
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};
                count++;

                let gridId = `grid-${currentCh.group.replace(/\s+/g, '-').toLowerCase()}`;
                let grid = document.getElementById(gridId);
                
                if (!grid) {
                    const container = document.createElement('div');
                    container.className = 'category-container';
                    container.innerHTML = `<div class="category-title">${currentCh.group.toUpperCase()}</div><div class="grid" id="${gridId}"></div>`;
                    mainList.appendChild(container);
                    grid = document.getElementById(gridId);
                }

                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="logo-box"><img src="${currentCh.logo}" onerror="this.src='https://via.placeholder.com/150x80?text=TV'"></div>
                    <div class="info-box"><div class="name">${currentCh.name}</div></div>
                `;
                
                card.onclick = () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');

                    // Preparazione chiavi per Video.js EME
                    const emeOptions = {
                        keySystems: {
                            'org.w3.clearkey': {
                                videoRobustness: 'sw_secure_decode',
                                audioRobustness: 'sw_secure_decode',
                                clearkeys: currentCh.drm
                            }
                        }
                    };

                    player.src({
                        src: url,
                        type: 'application/dash+xml',
                        keySystems: emeOptions.keySystems
                    });

                    window.scrollTo({top: 0, behavior: 'smooth'});
                };
                grid.appendChild(card);
                ch = { drm: {} };
            }
        }
        chanCount.innerText = count + " CANALI";
    } catch(e) { console.error("Errore:", e); }
}

init();
</script>
</body>
</html>
