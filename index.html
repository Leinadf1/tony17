            0% { transform: scale(1); filter: drop-shadow(0 0 0px #05ff12); }

        /* STILI ORIGINALI */
        body {

        #header {

            display: flex; 
            justify-content: space-between;

        }

        h1 { 
            font-size: 22px;

        #chan-count { 
            font-size: 13px; 
            color: #05ff12;

            padding: 4px 12px;

        }

        .player-container { 
            width: 100%; 
            max-width: 820px;

            margin-bottom: 40px; 
            border-radius: 8px;

        video { width: 100%; aspect-ratio: 16/9; display: block; }

        .category-container { 
            width: 100%;

            font-size: 18px;

            margin-bottom: 20px;

        .category-title::before {

            .splash-subtitle { font-size: 15px; }

    <!-- SCHERMATA DI BENVENUTO -->
    <div id="splash-screen">
        <img src="https://leinadf1.github.io/kicktv/image.png" alt="Logo" class="splash-logo">
        <div class="splash-title">Kick Streaming</div>
        <div class="splash-subtitle">Tutto ciò che è a pagamento è gratis con noi! 🔥</div>
    </div>

    <div id="header">
        <h1>KICK TV🔥📺</h1>
        <div id="chan-count">0 CANALI</div>
    </div>

        <video autoplay data-shaka-player id="video"></video>

<script>
// Gestione rimozione Splash Screen
window.addEventListener('load', () => {
    setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        splash.classList.add('fade-out');
    }, 3000);
});

document.getElementById('splash-screen').addEventListener('click', function() {
    this.classList.add('fade-out');
});

const SOURCE_API = "lista.m3u";

/* FALLBACK ICONA CANALE (visibile sempre, anche offline) */
const FALLBACK_ICON = 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 80" fill="none">
  <rect width="150" height="80" fill="#161b22"/>
  <text x="75" y="45" dominant-baseline="middle" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#f0f6fc">TV</text>
</svg>`);

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');
    const chanCount = document.getElementById('chan-count');

    player.configure({ 
        manifest: { dash: { ignoreDrmInfo: true } }, 
        streaming: { jumpLargeGaps: true, retryParameters: { maxAttempts: 3 } }
    });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (request.uris[0].includes('pluscdn.pl') || request.uris[0].includes('t-mobile.pl')) {
            request.allowCrossOrigin = true;
            request.headers['User-Agent'] = 'Mozilla/5.0 (Web0S; Linux; SmartTV) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.5735.199 Safari/537.36';
            delete request.headers['Origin']; delete request.headers['Referer'];
        }
    });

    try {
        const res = await fetch(SOURCE_API);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                if (line.includes('{')) {
                    try { ch.drm = JSON.parse(line.split('license_key=')[1]); } catch(e) {}
                } else {
                    const m = line.match(/[a-f0-9]{32}/gi);
                    if (m && m.length >= 2) {
                        for (let i = 0; i < m.length; i += 2) { if (m[i+1]) ch.drm[m[i]] = m[i+1]; }
                    }
                }
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};
                count++;

                let gridId = `grid-${currentCh.group.replace(/[^\w]/g, '-').toLowerCase()}`;
                let grid = document.getElementById(gridId);
                
                if (!grid) {
                    const container = document.createElement('div');
                    container.className = 'category-container';
                    container.innerHTML = `<div class="category-title">${currentCh.group}</div><div class="grid" id="${gridId}"></div>`;
                    mainList.appendChild(container);
                    grid = document.getElementById(gridId);
                }

                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="logo-box"><img src="${currentCh.logo}" onerror="this.src='${FALLBACK_ICON}'" alt="logo"></div>
                    <div class="info-box"><div class="name">${currentCh.name}</div></div>
                `;
                
                card.onclick = async () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    await player.unload();
                    player.configure({ drm: { clearKeys: currentCh.drm } });
                    try {
                        const finalUrl = url.startsWith('http://') ? url.replace('http://', 'https://') : url;
                        await player.load(finalUrl);
                        window.scrollTo({top: 0, behavior: 'smooth'});
                    } catch (e) { console.error("Errore Shaka:", e); }
                };
                grid.appendChild(card);
                ch = { drm: {} };
            }
        }
        chanCount.innerText = count + " CANALI";
    } catch(e) { console.error("Errore API:", e); }
}
document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
