<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>KICK TV</title>

    <!-- ICONE (immagine originale) -->
    <link rel="icon" type="image/png" sizes="512x512" href="https://leinadf1.github.io/kicktv/image.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="https://leinadf1.github.io/kicktv/image.png?v=2">
    <link rel="icon" type="image/png" href="https://leinadf1.github.io/kicktv/image.png?v=2">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* SPLASH SCREEN CSS */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
            text-align: center;
            padding: 20px;
        }

        #splash-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .splash-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .splash-title {
            font-size: 32px;
            font-weight: 800;
            color: #05ff12;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .splash-subtitle {
            font-size: 18px;
            font-weight: 400;
            color: #f0f6fc;
            max-width: 400px;
            line-height: 1.5;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px #05ff12); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 15px #05ff12); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px #05ff12); }
        }

        /* STILI ORIGINALI */
        body { 
            background-color: #000000; 
            color: #f0f6fc; 
            font-family: 'Inter', sans-serif;
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            -webkit-font-smoothing: antialiased; 
        }

        #header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            border-bottom: 1px solid #1f2328; 
            padding-bottom: 15px; 
            box-sizing: border-box; 
        }

        h1 { 
            font-size: 22px; 
            font-weight: 800; 
            color: #05ff12; 
            margin: 0; 
            letter-spacing: -0.5px; 
            text-transform: uppercase;
        }

        #chan-count { 
            font-size: 13px; 
            color: #05ff12; 
            font-weight: 600; 
            background: #161b22; 
            padding: 4px 12px; 
            border-radius: 20px;
            border: 1px solid rgba(5, 255, 18, 0.3);
        }

        .player-container { 
            width: 100%; 
            max-width: 820px; 
            background: #000; 
            margin-bottom: 40px; 
            border-radius: 8px; 
            overflow: hidden; 
        }

        video { width: 100%; aspect-ratio: 16/9; display: block; }

        #main-list {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .category-container { 
            width: 100%; 
            margin-bottom: 45px; 
        }

        .category-title { 
            font-size: 18px; 
            color: #05ff12; 
            margin-bottom: 20px; 
            font-weight: 700; 
            letter-spacing: 1px; 
            display: flex; 
            align-items: center; 
        }

        .category-title::before { 
            content: ""; 
            display: inline-block; 
            width: 4px; 
            height: 18px; 
            background: #05ff12; 
            margin-right: 12px; 
            border-radius: 2px; 
        }

        /* Stile per l'immagine bandiera (SVG inline) */
        .flag-img {
            height: 24px;
            width: auto;
            margin-right: 8px;
            vertical-align: middle;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            width: 100%; 
        }

        .channel-card { 
            background-color: #0d1117; 
            border: 1px solid #30363d; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.25s ease; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        .channel-card:hover { 
            transform: translateY(-5px); 
            border-color: #05ff12; 
            background-color: #161b22; 
        }

        .channel-card.active { 
            border: 2px solid #05ff12; 
            background-color: #161b22; 
        }

        .logo-box { 
            width: 100%; 
            height: 100px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000000; 
            padding: 15px; 
            box-sizing: border-box; 
        }

        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .info-box { 
            padding: 12px; 
            text-align: center; 
            border-top: 1px solid #30363d; 
            background: #0d1117; 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .name { 
            font-size: 13.5px; 
            font-weight: 600; 
            color: #f0f6fc; 
            text-transform: uppercase; 
            line-height: 1.3;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
            body { padding: 10px; }
            .name { font-size: 11.5px; }
            .splash-title { font-size: 24px; }
            .splash-subtitle { font-size: 15px; }
            .category-title { font-size: 16px; }
        }
    </style>
</head>
<body>

    <!-- SCHERMATA DI BENVENUTO -->
    <div id="splash-screen">
        <img src="https://leinadf1.github.io/kicktv/image.png" alt="Logo" class="splash-logo">
        <div class="splash-title">Kick Streaming</div>
        <div class="splash-subtitle">Tutto ciò che è a pagamento è gratis con noi! 🔥</div>
    </div>

    <div id="header">
        <h1>KICK TV🔥📺</h1>
        <div id="chan-count">0 CANALI</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list"></div>

<script>
// Gestione rimozione Splash Screen
window.addEventListener('load', () => {
    setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        splash.classList.add('fade-out');
    }, 3000);
});

document.getElementById('splash-screen').addEventListener('click', function() {
    this.classList.add('fade-out');
});

const SOURCE_API = "lista.m3u";

/* Icona di fallback per i canali */
const FALLBACK_ICON = 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 80" fill="none">
  <rect width="150" height="80" fill="#161b22"/>
  <text x="75" y="45" dominant-baseline="middle" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#f0f6fc">TV</text>
</svg>`);

// ========== BANDIERE COME SVG INLINE (data-URI) ==========
// Aggiungi altri paesi copiando l'SVG e cambiando il codice
const flagSVGs = {
    "pt": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23060' d='M0 0h213v480H0z'/%3E%3Cpath fill='%23F00' d='M213 0h427v480H213z'/%3E%3Ccircle cx='213' cy='240' r='106.7' fill='%23FF0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='213' cy='240' r='53.3' fill='%23060'/%3E%3C/svg%3E",
    "ba": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23000' d='M0 0h640v480H0z'/%3E%3Cpath fill='%23FFF' d='M0 0h640v320H0z'/%3E%3Cpath fill='%2300F' d='M0 0h640v160H0z'/%3E%3C/svg%3E",
    "it": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23009246' d='M0 0h213v480H0z'/%3E%3Cpath fill='%23FFF' d='M213 0h214v480H213z'/%3E%3Cpath fill='%23CE2B37' d='M427 0h213v480H427z'/%3E%3C/svg%3E",
    "gb": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23012169' d='M0 0h640v480H0z'/%3E%3Cpath stroke='%23FFF' stroke-width='18' d='M0 0l640 480M640 0L0 480'/%3E%3Cpath stroke='%23C8102E' stroke-width='12' d='M0 0l640 480M640 0L0 480'/%3E%3C/svg%3E",
    "us": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23FFF' d='M0 0h640v480H0z'/%3E%3Cpath fill='%23B22234' d='M0 0h640v37H0zm0 74h640v37H0zm0 74h640v37H0zm0 74h640v37H0zm0 74h640v37H0zm0 74h640v37H0zm0 74h640v37H0z'/%3E%3Cpath fill='%233C3B6E' d='M0 0h256v259H0z'/%3E%3C/svg%3E",
    "es": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23AA151B' d='M0 0h640v480H0z'/%3E%3Cpath fill='%23F1BF00' d='M0 120h640v240H0z'/%3E%3C/svg%3E",
    "fr": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%230055A4' d='M0 0h213v480H0z'/%3E%3Cpath fill='%23FFF' d='M213 0h214v480H213z'/%3E%3Cpath fill='%23EF4135' d='M427 0h213v480H427z'/%3E%3C/svg%3E",
    "de": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23000000' d='M0 0h640v160H0z'/%3E%3Cpath fill='%23DD0000' d='M0 160h640v160H0z'/%3E%3Cpath fill='%23FFCE00' d='M0 320h640v160H0z'/%3E%3C/svg%3E",
    "nl": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23AE1C28' d='M0 0h640v160H0z'/%3E%3Cpath fill='%23FFF' d='M0 160h640v160H0z'/%3E%3Cpath fill='%2321468B' d='M0 320h640v160H0z'/%3E%3C/svg%3E",
    "br": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23009B3A' d='M0 0h640v480H0z'/%3E%3Cpath fill='%23FEDF00' d='M320 240L640 480H0z'/%3E%3Ccircle cx='320' cy='240' r='106.7' fill='%23000'/%3E%3C/svg%3E",
    "ar": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%233D8A4A' d='M0 0h640v160H0z'/%3E%3Cpath fill='%23FFF' d='M0 160h640v160H0z'/%3E%3Cpath fill='%230074B8' d='M0 320h640v160H0z'/%3E%3C/svg%3E",
    "ro": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23002492' d='M0 0h640v480H0z'/%3E%3Cpath fill='%23FFC600' d='M0 0h640v320H0z'/%3E%3Cpath fill='%23CE1126' d='M0 0h640v160H0z'/%3E%3C/svg%3E",
    "gr": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%230D5EAF' d='M0 0h640v107H0z'/%3E%3Cpath fill='%23FFF' d='M0 107h640v107H0zm0 213h640v107H0z'/%3E%3Cpath fill='%230D5EAF' d='M0 426h640v53H0z'/%3E%3C/svg%3E",
    "mx": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23006242' d='M0 0h640v480H0z'/%3E%3Cpath fill='%23FFF' d='M0 0h640v320H0z'/%3E%3Cpath fill='%23CE1126' d='M0 0h640v160H0z'/%3E%3C/svg%3E",
    "pl": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 480'%3E%3Cpath fill='%23FFF' d='M0 0h640v240H0z'/%3E%3Cpath fill='%23DC143C' d='M0 240h640v240H0z'/%3E%3C/svg%3E"
};

// Mappa codice paese → codice SVG (minuscolo)
const countryCodeMap = {
    "PT": "pt", "BA": "ba", "IT": "it", "UK": "gb", "US": "us",
    "ES": "es", "FR": "fr", "DE": "de", "NL": "nl", "BR": "br",
    "AR": "ar", "RO": "ro", "GR": "gr", "MX": "mx", "PL": "pl"
};

// Estrae codice di due lettere all'inizio
function extractCountryCode(groupTitle) {
    const match = groupTitle.trim().match(/^([A-Z]{2})\b/);
    return match ? match[1] : null;
}

// Sostituisce il codice paese con l'immagine della bandiera SVG
function replaceCountryWithFlagImg(groupTitle) {
    const code = extractCountryCode(groupTitle);
    if (!code || !countryCodeMap[code]) return groupTitle;
    const svgData = flagSVGs[countryCodeMap[code]];
    if (!svgData) return groupTitle;
    const imgHtml = `<img src="${svgData}" alt="${code}" class="flag-img" />`;
    // Rimuove il codice iniziale e lo spazio successivo
    return imgHtml + groupTitle.replace(/^[A-Z]{2}\s*/, '');
}

async function init() {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');
    const chanCount = document.getElementById('chan-count');

    player.configure({ 
        manifest: { dash: { ignoreDrmInfo: true } }, 
        streaming: { jumpLargeGaps: true, retryParameters: { maxAttempts: 3 } }
    });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        if (request.uris[0].includes('pluscdn.pl') || request.uris[0].includes('t-mobile.pl')) {
            request.allowCrossOrigin = true;
            request.headers['User-Agent'] = 'Mozilla/5.0 (Web0S; Linux; SmartTV) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/114.0.5735.199 Safari/537.36';
            delete request.headers['Origin']; delete request.headers['Referer'];
        }
    });

    try {
        const res = await fetch(SOURCE_API);
        const text = await res.text();
        const lines = text.split('\n');
        let ch = { drm: {} };
        let count = 0;

        for (let line of lines) {
            line = line.trim();
            if (line.includes('license_key=')) {
                if (line.includes('{')) {
                    try { ch.drm = JSON.parse(line.split('license_key=')[1]); } catch(e) {}
                } else {
                    const m = line.match(/[a-f0-9]{32}/gi);
                    if (m && m.length >= 2) {
                        for (let i = 0; i < m.length; i += 2) { if (m[i+1]) ch.drm[m[i]] = m[i+1]; }
                    }
                }
            } else if (line.startsWith('#EXTINF:')) {
                ch.logo = (line.match(/tvg-logo="([^"]+)"/i) || [])[1] || "";
                ch.group = (line.match(/group-title="([^"]+)"/i) || [])[1] || "ALTRI";
                ch.name = (line.match(/,(.*)/) || [])[1] || "Canale";
            } else if (line.startsWith('http')) {
                const url = line;
                const currentCh = {...ch};
                count++;

                // Genera titolo categoria con bandiera SVG
                const groupHtml = replaceCountryWithFlagImg(currentCh.group);

                let gridId = `grid-${currentCh.group.replace(/[^\w]/g, '-').toLowerCase()}`;
                let grid = document.getElementById(gridId);
                
                if (!grid) {
                    const container = document.createElement('div');
                    container.className = 'category-container';
                    container.innerHTML = `<div class="category-title">${groupHtml}</div><div class="grid" id="${gridId}"></div>`;
                    mainList.appendChild(container);
                    grid = document.getElementById(gridId);
                }

                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <div class="logo-box"><img src="${currentCh.logo}" onerror="this.src='${FALLBACK_ICON}'" alt="logo"></div>
                    <div class="info-box"><div class="name">${currentCh.name}</div></div>
                `;
                
                card.onclick = async () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    await player.unload();
                    player.configure({ drm: { clearKeys: currentCh.drm } });
                    try {
                        const finalUrl = url.startsWith('http://') ? url.replace('http://', 'https://') : url;
                        await player.load(finalUrl);
                        window.scrollTo({top: 0, behavior: 'smooth'});
                    } catch (e) { console.error("Errore Shaka:", e); }
                };
                grid.appendChild(card);
                ch = { drm: {} };
            }
        }
        chanCount.innerText = count + " CANALI";
    } catch(e) { console.error("Errore API:", e); }
}
document.addEventListener('shaka-ui-loaded', init);
</script>
</body>
</html>
